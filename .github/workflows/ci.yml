name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build pathwise-core
        run: cargo build -p pathwise-core
      - name: Test pathwise-core
        run: cargo test -p pathwise-core
      - name: Clippy
        run: cargo clippy -p pathwise-core -- -D warnings
      - name: Format check
        run: cargo fmt --all --check

  python:
    name: Python tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pip install maturin pytest numpy scipy
      - name: Build and install
        run: pip install -e . --no-build-isolation
      - name: Run API and numerical tests
        run: pytest tests/ -v
      - name: Run scheme/process binding tests
        run: pytest pathwise-py/tests/ -v
