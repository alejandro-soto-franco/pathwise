name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p pathwise-core
      - run: cargo test -p pathwise-core --test convergence
      - run: cargo clippy -- -D warnings
      - run: cargo fmt --check

  python:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - run: pip install maturin pytest numpy scipy
      - run: pip install .
      - run: pytest tests/ -v
